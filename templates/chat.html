<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Program Manager Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:#f5f5f7;height:100vh;display:flex;flex-direction:column;}

nav{background:white;border-bottom:0.5px solid #e8e8e8;padding:0 24px;display:flex;align-items:center;height:52px;flex-shrink:0;}
.nav-icon{width:28px;height:28px;border-radius:8px;background:#1D9E75;display:flex;align-items:center;justify-content:center;margin-right:10px;}
.nav-icon svg{width:14px;height:14px;}
.nav-title{font-size:14px;font-weight:500;color:#1a1a1a;letter-spacing:-0.01em;margin-right:8px;}
.live-pill{font-size:11px;background:#f0faf5;color:#0F6E56;padding:2px 8px;border-radius:20px;border:0.5px solid #9FE1CB;}

.messages{flex:1;overflow-y:auto;padding:24px;}
.messages-inner{max-width:780px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:16px;}

.date-sep{font-size:11px;color:#999;text-align:center;padding:4px 0;}

.agent-card{background:white;border:0.5px solid #e8e8e8;border-radius:12px;padding:20px 24px;font-size:13px;color:#1a1a1a;line-height:1.7;}

.user-msg{display:flex;justify-content:flex-end;}
.user-bubble{background:#1D9E75;color:white;border-radius:12px;padding:12px 18px;max-width:72%;font-size:13px;line-height:1.6;font-weight:400;}

.typing-card{background:white;border:0.5px solid #e8e8e8;border-radius:12px;padding:16px 20px;display:flex;gap:5px;align-items:center;width:fit-content;}
.dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

.section-label{font-size:11px;font-weight:600;color:#888;letter-spacing:0.07em;text-transform:uppercase;margin:16px 0 10px;}
.section-label:first-child{margin-top:0;}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0 16px;}
.stat-box{background:#f5f5f7;border-radius:10px;padding:14px;}
.stat-box.amber{background:#fffbf0;}
.stat-label{font-size:11px;color:#888;margin-bottom:6px;}
.stat-num{font-size:22px;font-weight:500;color:#1a1a1a;}
.stat-num.green{color:#1D9E75;}
.stat-num.amber{color:#BA7517;}

.batch-list{border-top:0.5px solid #f0f0f0;margin:8px 0;}
.batch-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:0.5px solid #f0f0f0;}
.batch-left{display:flex;align-items:baseline;gap:8px;}
.batch-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.batch-date{font-size:12px;color:#aaa;}
.status-pill{font-size:11px;padding:4px 11px;border-radius:20px;white-space:nowrap;}
.pill-green{background:#f0faf5;color:#0F6E56;border:0.5px solid #9FE1CB;}
.pill-amber{background:#fff8f0;color:#854F0B;border:0.5px solid #FAC775;}
.pill-grey{background:#f5f5f7;color:#555;border:0.5px solid #ddd;}
.pill-red{background:#fff0f0;color:#991b1b;border:0.5px solid #fca5a5;}

.prose{font-size:13px;color:#1a1a1a;line-height:1.75;margin:4px 0;}
.prose b{font-weight:500;}
.bullet-item{display:flex;align-items:flex-start;gap:8px;padding:3px 0;font-size:13px;color:#1a1a1a;line-height:1.6;}
.bullet-dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;flex-shrink:0;margin-top:7px;}

.urgent-box{background:#fffbf0;border:0.5px solid #FAC775;border-radius:8px;padding:10px 14px;margin:6px 0;font-size:13px;color:#854F0B;line-height:1.6;}

.email-section{margin-top:14px;}
.email-count{font-size:13px;color:#555;margin-bottom:10px;}
.email-pills{display:flex;flex-wrap:wrap;gap:8px;}
.email-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#0F6E56;background:#f0faf5;border:0.5px solid #9FE1CB;padding:7px 13px;border-radius:7px;text-decoration:none;cursor:pointer;}
.email-pill:hover{background:#E1F5EE;}
.email-pill svg{width:12px;height:12px;flex-shrink:0;}
.more-pill{font-size:12px;color:#555;background:#f5f5f7;border:0.5px solid #ddd;padding:7px 13px;border-radius:7px;}

.bottom{background:white;border-top:0.5px solid #e8e8e8;padding:12px 24px 18px;flex-shrink:0;}
.bottom-inner{max-width:780px;margin:0 auto;}
.quick-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.quick-pill{font-size:11px;color:#555;background:white;border:0.5px solid #ddd;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;}
.quick-pill:hover{background:#f5f5f7;}
.input-row{display:flex;gap:10px;align-items:center;}
.input-row input{flex:1;border:0.5px solid #e0e0e0;border-radius:8px;padding:10px 16px;font-size:13px;background:#f5f5f7;outline:none;font-family:inherit;color:#1a1a1a;}
.input-row input:focus{border-color:#1D9E75;background:white;}
.send-btn{width:38px;height:38px;border-radius:8px;background:#1D9E75;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{background:#0F6E56;}
.send-btn svg{width:14px;height:14px;fill:white;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d0d8e0;border-radius:4px;}
</style>
</head>
<body>

<nav>
  <div class="nav-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 8v4l3 3"/>
    </svg>
  </div>
  <span class="nav-title">Learning Program Manager Agent</span>
  <span class="live-pill">Live</span>
</nav>

<div class="messages" id="messages">
  <div class="messages-inner" id="inner">
    <div class="date-sep" id="dateSep"></div>
    <div class="agent-card">
      Hello. LDP data loaded. <b>20 certificates issued</b> for Batch 01 completers. <b>26 Batch 04 participants</b> are confirmed — workshop is in 14 days on 28-29 April. Joining emails are the next priority. How can I help?
    </div>
  </div>
</div>

<div class="bottom">
  <div class="bottom-inner">
    <div class="quick-pills">
      <button class="quick-pill" onclick="sendQuick('What is the overall programme status?')">Programme status</button>
      <button class="quick-pill" onclick="sendQuick('Draft joining emails for all Batch 04 participants')">Batch 04 joining emails</button>
      <button class="quick-pill" onclick="sendQuick('Who needs VL nudges?')">VL nudges needed</button>
      <button class="quick-pill" onclick="sendQuick('What is the Batch 04 status?')">Batch 04 status</button>
      <button class="quick-pill" onclick="sendQuick('What are today\'s priority actions?')">Today\'s actions</button>
    </div>
    <div class="input-row">
      <input type="text" id="userInput"
        placeholder="Ask about your LDP programme..."
        onkeydown="if(event.key==='Enter')sendMessage()"/>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const history = [];

(async function loadTodaysActions(){
  showTyping();
  try {
    const res = await fetch('/todays_actions');
    const data = await res.json();
    removeTyping();
    if(data.programme_data) {
      renderDashboard(data.programme_data, data.actions);
    } else {
      addCard(formatMessage(data.actions || 'No actions today.'));
    }
  } catch(e) {
    removeTyping();
  }
})();

document.getElementById('dateSep').textContent =
  new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

function esc(t){
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBot(){
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function addUserMsg(text){
  const d = document.createElement('div');
  d.className = 'user-msg';
  d.innerHTML = `<div class="user-bubble">${esc(text)}</div>`;
  document.getElementById('inner').appendChild(d);
  scrollBot();
}

function addCard(html){
  const d = document.createElement('div');
  d.className = 'agent-card';
  d.innerHTML = html;
  document.getElementById('inner').appendChild(d);
  scrollBot();
  return d;
}

function showTyping(){
  const d = document.createElement('div');
  d.id = 'typing';
  d.className = 'typing-card';
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('inner').appendChild(d);
  scrollBot();
}

function removeTyping(){
  const t = document.getElementById('typing');
  if(t) t.remove();
}

function formatMessage(raw){
  let text = raw;

  // ── 1. Extract email blocks ──────────────────────────────────
  let emailButtons = [];
  const emailRx = /---EMAIL---([\s\S]+?)---END---/g;
  let em;
  while((em = emailRx.exec(raw)) !== null){
    const b = em[1];
    const toM = b.match(/TO:\s*(.+)/i);
    const subM = b.match(/SUBJECT:\s*(.+)/i);
    const bodyM = b.match(/BODY:\s*([\s\S]+)/i);
    if(toM && subM && bodyM){
      const to = toM[1].trim();
      const sub = subM[1].trim();
      const body = bodyM[1].replace(/---END---/g,'').trim();
      const url = 'https://mail.google.com/mail/?view=cm&fs=1'
        +'&to='+encodeURIComponent(to)
        +'&su='+encodeURIComponent(sub)
        +'&body='+encodeURIComponent(body);
      emailButtons.push({name: to, url: url});
    }
    text = text.replace(em[0], '');
  }

  // ── 2. Extract STATS: line → metric cards ───────────────────
  let statsHtml = '';
  const statsMatch = text.match(/^STATS:\s*(.+)$/m);
  if(statsMatch){
    const parts = statsMatch[1].split('|').map(s => s.trim());
    // Extract leading number only (guard against "4 active" style outputs)
    const num = s => { const m = s.match(/^\d+/); return m ? m[0] : (s||'—'); };
    const cards = [
      {label:'Batches active', val: num(parts[0]), numCls:'',      boxCls:''},
      {label:'In pipeline',    val: num(parts[1]), numCls:'',      boxCls:''},
      {label:'Completed',      val: num(parts[2]), numCls:'green', boxCls:''},
      {label:'Action needed',  val: num(parts[3]), numCls:'amber', boxCls:'amber'},
    ];
    statsHtml = '<div class="stats-grid">'
      + cards.map(c =>
          `<div class="stat-box${c.boxCls?' '+c.boxCls:''}">
            <div class="stat-label">${c.label}</div>
            <div class="stat-num${c.numCls?' '+c.numCls:''}">${esc(c.val)}</div>
          </div>`
        ).join('')
      + '</div>';
    text = text.replace(statsMatch[0], '\x00STATS\x00');
  }

  // ── 3. Extract BATCH: lines → status rows ───────────────────
  let batchHtml = '';
  const batchLineRx = /^BATCH:\s*.+$/gm;
  const batchLines = text.match(batchLineRx) || [];
  if(batchLines.length > 0){
    const pillMap = {
      green: {cls:'pill-green', label:'Complete'},
      amber: {cls:'pill-amber', label:'In Progress'},
      grey:  {cls:'pill-grey',  label:'Upcoming'},
      red:   {cls:'pill-red',   label:'At Risk'},
    };
    const rows = batchLines.map(line => {
      const parts = line.replace(/^BATCH:\s*/,'').split('|').map(s => s.trim());
      const name  = parts[0] || '';
      const dt    = parts[1] || '';
      const color = (parts[2] || 'grey').toLowerCase();
      const desc  = parts[3] || '';
      const pill  = pillMap[color] || pillMap.grey;
      return `<div class="batch-row">
        <div class="batch-left">
          <span class="batch-name">${esc(name)}</span>
          <span class="batch-date">${esc(dt)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;">
          <span style="font-size:12px;color:#666;">${esc(desc)}</span>
          <span class="status-pill ${pill.cls}">${pill.label}</span>
        </div>
      </div>`;
    }).join('');
    batchHtml = '<div class="batch-list">' + rows + '</div>';
    text = text.replace(batchLineRx, '').replace(/\x00STATS\x00/, '\x00STATS\x00');
  }

  // ── 4. Clean markdown ────────────────────────────────────────
  text = text.replace(/^\|.*\|$/gm,'');
  text = text.replace(/^\|[-|:\s]+\|$/gm,'');
  text = text.replace(/^-{3,}$/gm,'');
  text = text.replace(/^#{4,}\s*/gm,'');
  text = text.replace(/^#{3}\s*/gm,'');
  text = text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
  text = text.replace(/\*(.*?)\*/g,'<i>$1</i>');

  // Convert ## to section labels
  text = text.replace(/^##\s+(.+)$/gm,
    '\n<div class="section-label">$1</div>\n');

  // Bullet points
  text = text.replace(/^[\-\*•]\s+(.+)$/gm,
    '<div class="bullet-item"><div class="bullet-dot"></div><div>$1</div></div>');

  // Numbered lists
  text = text.replace(/^\d+\.\s+(.+)$/gm,
    '<div class="bullet-item"><div class="bullet-dot"></div><div>$1</div></div>');

  // ── 5. Paragraphs ────────────────────────────────────────────
  const lines = text.split('\n');
  let html = '';
  let prevBlank = false;
  for(let line of lines){
    const trimmed = line.trim();
    if(trimmed === '\x00STATS\x00'){
      html += statsHtml;
      if(batchHtml) html += batchHtml;
      prevBlank = false;
      continue;
    }
    if(!trimmed){
      if(!prevBlank) html += '<br>';
      prevBlank = true;
      continue;
    }
    prevBlank = false;
    if(trimmed.startsWith('<div') || trimmed.startsWith('<br')){
      html += trimmed;
    } else {
      html += `<div class="prose">${trimmed}</div>`;
    }
  }

  // If STATS/BATCH were never placed (e.g. no surrounding text), prepend them
  if(statsHtml && !html.includes(statsHtml)){
    html = statsHtml + (batchHtml || '') + html;
  } else if(batchHtml && !html.includes(batchHtml)){
    html = batchHtml + html;
  }

  // Clean up excess breaks
  html = html.replace(/(<br>){3,}/g,'<br><br>');
  html = html.replace(/^<br>/,'');

  // ── 6. Email section ─────────────────────────────────────────
  if(emailButtons.length > 0){
    const visible = emailButtons.slice(0,4);
    const extra = emailButtons.length - 4;
    let pills = visible.map(e =>
      `<a href="${e.url}" target="_blank" class="email-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>${esc(e.name)}</a>`
    ).join('');
    if(extra > 0) pills += `<span class="more-pill">+${extra} more</span>`;
    html += `<div class="email-section">
      <div class="email-count">${emailButtons.length} email${emailButtons.length>1?'s':''} ready — click to open in Gmail</div>
      <div class="email-pills">${pills}</div>
    </div>`;
  }

  return html;
}

function isStatusQuery(msg) {
  const t = msg.toLowerCase();
  return t.includes('status') || t.includes('overview') || t.includes('dashboard') || t.includes('summary');
}

function renderDashboard(pd, reply) {
  let html = '';

  if(pd.batch_status) {
    const stats = [
      {label:'Batches active', val: pd.batch_status.length, color:''},
      {label:'In pipeline', val: pd.total_employees, color:''},
      {label:'Certified', val: pd.total_certs, color:'green'},
      {label:'Action needed', val: pd.action_needed, color:'amber'},
    ];
    html += '<div class="stats-grid">';
    stats.forEach(s => {
      html += `<div class="stat-box${s.color?' '+s.color:''}">
        <div class="stat-label">${s.label}</div>
        <div class="stat-num${s.color?' '+s.color:''}">${s.val}</div>
      </div>`;
    });
    html += '</div>';

    html += '<div class="batch-list">';
    pd.batch_status.forEach(b => {
      html += `<div class="batch-row">
        <div class="batch-left">
          <span class="batch-name">${b.name}</span>
          <span class="batch-date">${b.date}</span>
        </div>
        <span class="status-pill pill-${b.color}">${b.desc}</span>
      </div>`;
    });
    html += '</div>';
  }

  if(reply) {
    html += '<div style="margin-top:14px;border-top:0.5px solid #f0f0f0;padding-top:14px;">';
    html += formatMessage(reply);
    html += '</div>';
  }

  addCard(html);
}

function isBatch4EmailQuery(msg) {
  const t = msg.toLowerCase();
  const hasBatch4 = t.includes('batch 4') || t.includes('batch04') || t.includes('batch-04') || t.includes('batch 04');
  const hasEmail  = t.includes('email') || t.includes('joining') || t.includes('invite') || t.includes('draft');
  return hasBatch4 && hasEmail;
}

function renderBatch4Emails(emails) {
  let html = '<div style="font-size:13px;color:#1a1a1a;margin-bottom:14px;">Here are the emails for Batch 4 participants</div>';
  html += '<div class="email-pills">';
  emails.forEach(e => {
    const url = 'https://mail.google.com/mail/?view=cm&fs=1'
      + '&to='   + encodeURIComponent(e.to)
      + '&su='   + encodeURIComponent(e.subject)
      + '&body=' + encodeURIComponent(e.body);
    html += `<a href="${url}" target="_blank" class="email-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>${esc(e.name)}</a>`;
  });
  html += '</div>';
  addCard(html);
}

async function sendMessage(){
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';
  addUserMsg(msg);

  if(isBatch4EmailQuery(msg)) {
    showTyping();
    try {
      const res  = await fetch('/batch4_emails');
      const data = await res.json();
      removeTyping();
      history.push({role:'user', content: msg});
      history.push({role:'assistant', content: 'Here are the emails for Batch 4 participants'});
      renderBatch4Emails(data.emails || []);
    } catch(e) {
      removeTyping();
      addCard('Sorry, could not load Batch 4 emails. Please try again.');
    }
    return;
  }

  history.push({role:'user', content: msg});
  showTyping();
  try{
    const res = await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: msg, history: history})
    });
    const data = await res.json();
    removeTyping();
    const reply = data.reply || 'Sorry, something went wrong.';
    history.push({role:'assistant', content: reply});
    if(data.programme_data && isStatusQuery(msg)) {
      renderDashboard(data.programme_data, reply);
    } else {
      addCard(formatMessage(reply));
    }
  } catch(e){
    removeTyping();
    addCard('Sorry, something went wrong. Please try again.');
  }
}

function sendQuick(text){
  document.getElementById('userInput').value = text;
  sendMessage();
}
</script>
</body>
</html>
